# Unified v2 self-hosted Compose setup.
# Container listens on 8080, persists SQLite and auth/session data at /app/data,
# and fresh databases redirect to /setup for bootstrap account creation.
services:
  postbaby:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${POSTBABY_PORT:-8080}:8080"
    environment:
      POSTBABY_DEPLOYMENT_MODE: ${POSTBABY_DEPLOYMENT_MODE:-selfhosted_single_user}
      POSTBABY_COOKIE_SECURE: ${POSTBABY_COOKIE_SECURE:-false}
      POSTBABY_SESSION_TTL: ${POSTBABY_SESSION_TTL:-720h}
    volumes:
      - type: bind
        source: ${POSTBABY_DATA_DIR:-./postbaby-data}
        target: /app/data
    restart: unless-stopped
